<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CycleFlow CRM — Leads</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0D0A0C;
  --surface:  #161114;
  --border:   rgba(255,255,255,.08);
  --rose:     #D4607A;
  --crimson:  #9B1B4F;
  --gold:     #C9A961;
  --green:    #4E9B7A;
  --red:      #C94545;
  --text:     #F5F0F2;
  --muted:    rgba(255,255,255,.4);
  --hot-bg:   rgba(155,27,79,.18);
  --hot-col:  #E87A9A;
  --warm-bg:  rgba(201,169,97,.15);
  --warm-col: #C9A961;
}
body { font-family: -apple-system, 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── APP ── */
#app { padding: 28px 32px; max-width: 1280px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 36px; height: 36px; background: linear-gradient(135deg, var(--crimson), var(--rose));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.btn-refresh {
  background: rgba(255,255,255,.06); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer;
  transition: background .2s; display: flex; align-items: center; gap: 6px;
}
.btn-refresh:hover { background: rgba(255,255,255,.1); }
.btn-export {
  background: rgba(201,169,97,.12); border: 1px solid rgba(201,169,97,.25); color: var(--gold);
  border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer;
  transition: background .2s; display: flex; align-items: center; gap: 6px;
}
.btn-export:hover { background: rgba(201,169,97,.2); }
.header-actions { display: flex; gap: 8px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 22px;
}
.stat-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.stat-value { font-size: 32px; font-weight: 700; line-height: 1; }
.stat-sub   { font-size: 12px; color: var(--muted); margin-top: 6px; }
.stat.hot  .stat-value { color: var(--hot-col); }
.stat.gold .stat-value { color: var(--gold); }
.stat.green .stat-value { color: var(--green); }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  color: var(--muted); border-radius: 999px; padding: 7px 16px; font-size: 13px;
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.filter-btn.active, .filter-btn:hover { background: rgba(212,96,122,.15); border-color: rgba(212,96,122,.4); color: var(--rose); }
.search-input {
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 13px;
  outline: none; transition: border-color .2s; margin-left: auto; width: 220px;
}
.search-input:focus { border-color: var(--rose); }

/* Table */
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: rgba(255,255,255,.03); }
th {
  text-align: left; padding: 14px 16px; font-size: 11px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
}
td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase; white-space: nowrap;
}
.badge.hot    { background: var(--hot-bg);  color: var(--hot-col); }
.badge.warm   { background: var(--warm-bg); color: var(--warm-col); }
.badge.cycleflow-quiz     { background: rgba(155,27,79,.12);  color: #D4607A; }
.badge.cycleflow-calendly { background: rgba(78,155,122,.12); color: #4E9B7A; }
.badge.harmonizacao-quiz  { background: rgba(176,122,181,.12); color: #B07AB5; }

.btn-copy {
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px; padding: 4px 10px; font-size: 12px;
  cursor: pointer; transition: all .2s; margin-left: 6px; white-space: nowrap;
}
.btn-copy:hover  { background: rgba(255,255,255,.12); color: var(--text); }
.btn-copy.copied { background: rgba(78,155,122,.15); border-color: rgba(78,155,122,.3); color: var(--green); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state svg { opacity: .3; margin-bottom: 16px; }

.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

.receita { color: var(--gold); font-weight: 600; }

@media (max-width: 900px) {
  #app { padding: 16px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .search-input { width: 160px; margin-left: 0; }
  th:nth-child(4), td:nth-child(4),
  th:nth-child(6), td:nth-child(6) { display: none; }
}
</style>
</head>
<body>

<!-- APP -->
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </div>
      <div>
        <h1>CRM · Leads</h1>
        <div class="header-sub" id="last-updated">Carregando…</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-export" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
      <button class="btn-refresh" onclick="loadLeads()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Atualizar
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total de leads</div>
      <div class="stat-value" id="s-total">—</div>
      <div class="stat-sub">todos os quizzes</div>
    </div>
    <div class="stat hot">
      <div class="stat-label">MQL quente</div>
      <div class="stat-value" id="s-hot">—</div>
      <div class="stat-sub">alta intenção</div>
    </div>
    <div class="stat gold">
      <div class="stat-label">Agendamentos</div>
      <div class="stat-value" id="s-cal">—</div>
      <div class="stat-sub">form Calendly preenchido</div>
    </div>
    <div class="stat green">
      <div class="stat-label">Receita em risco</div>
      <div class="stat-value" id="s-receita">—</div>
      <div class="stat-sub">total calculado pelos quizzes</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" data-filter="cycleflow-quiz" onclick="setFilter('cycleflow-quiz', this)">CycleFlow Quiz</button>
    <button class="filter-btn" data-filter="cycleflow-calendly" onclick="setFilter('cycleflow-calendly', this)">Calendly</button>
    <button class="filter-btn" data-filter="harmonizacao-quiz" onclick="setFilter('harmonizacao-quiz', this)">Harmonização Quiz</button>
    <button class="filter-btn" data-filter="mql-hot" onclick="setFilter('mql-hot', this)">🔥 MQL Quente</button>
    <input type="text" class="search-input" id="search" placeholder="Buscar nome ou WhatsApp…" oninput="renderTable()">
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="loading" id="loading">Carregando leads…</div>
    <table id="leads-table" style="display:none">
      <thead>
        <tr>
          <th>Data</th>
          <th>Nome</th>
          <th>WhatsApp</th>
          <th>E-mail</th>
          <th>Origem</th>
          <th>Classificação</th>
          <th>Pontuação</th>
          <th>Receita em risco</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>Nenhum lead encontrado</p>
    </div>
  </div>

</div>

<script>
'use strict';

/* ── CONFIG ── */
const SUPABASE_URL  = 'https://wkxipimeaftbzfsvfnob.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndreGlwaW1lYWZ0Ynpmc3Zmbm9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODE3MzAsImV4cCI6MjA5MTc1NzczMH0.Srd0Ce78lvAY6gNbW0TUxSxJdEcGCSj3sC9m6VjOdj4';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allLeads   = [];
let activeFilter = 'all';

loadLeads();

/* ── LOAD ── */
async function loadLeads() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('leads-table').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  const { data, error } = await sb
    .from('quiz_leads')
    .select('*')
    .order('created_at', { ascending: false });

  document.getElementById('loading').style.display = 'none';

  if (error) {
    console.error(error);
    document.getElementById('loading').textContent = 'Erro ao carregar leads. Verifique o console.';
    document.getElementById('loading').style.display = 'block';
    return;
  }

  allLeads = data || [];
  updateStats();
  renderTable();

  const now = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  document.getElementById('last-updated').textContent = `Atualizado às ${now}`;
}

/* ── STATS ── */
function updateStats() {
  document.getElementById('s-total').textContent = allLeads.length;
  document.getElementById('s-hot').textContent   = allLeads.filter(l => l.classificacao === 'mql-hot').length;
  document.getElementById('s-cal').textContent   = allLeads.filter(l => l.origem === 'cycleflow-calendly').length;

  const totalReceita = allLeads.reduce((s, l) => s + (l.receita_risco || 0), 0);
  document.getElementById('s-receita').textContent = totalReceita > 0
    ? 'R$ ' + totalReceita.toLocaleString('pt-BR')
    : '—';
}

/* ── FILTER ── */
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

/* ── RENDER ── */
function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();

  let rows = allLeads.filter(l => {
    if (activeFilter === 'mql-hot')  return l.classificacao === 'mql-hot';
    if (activeFilter !== 'all') return l.origem === activeFilter;
    return true;
  }).filter(l => {
    if (!search) return true;
    return (l.nome || '').toLowerCase().includes(search) ||
           (l.whatsapp || '').includes(search);
  });

  const tbody = document.getElementById('tbody');

  if (rows.length === 0) {
    document.getElementById('leads-table').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    return;
  }

  document.getElementById('leads-table').style.display = 'table';
  document.getElementById('empty-state').style.display = 'none';

  tbody.innerHTML = rows.map(l => {
    const dt = new Date(l.created_at);
    const data = dt.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }) +
                 ' ' + dt.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

    const origemLabel = {
      'cycleflow-quiz':     'CycleFlow Quiz',
      'cycleflow-calendly': 'Calendly',
      'harmonizacao-quiz':  'Harmonização'
    }[l.origem] || l.origem;

    const classLabel = l.classificacao === 'mql-hot'  ? 'MQL Quente' :
                       l.classificacao === 'lead-warm' ? 'Morno' : '—';
    const classCss   = l.classificacao === 'mql-hot'  ? 'hot' :
                       l.classificacao === 'lead-warm' ? 'warm' : '';

    const receita = l.receita_risco
      ? `<span class="receita">R$ ${l.receita_risco.toLocaleString('pt-BR')}</span>`
      : '—';

    const wppNum = (l.whatsapp || '').replace(/\D/g, '');
    const wppLink = wppNum.length >= 10
      ? `<a href="https://wa.me/55${wppNum}" target="_blank" style="color:var(--text)">${l.whatsapp}</a>`
      : (l.whatsapp || '—');

    return `<tr>
      <td style="color:var(--muted);white-space:nowrap">${data}</td>
      <td><strong>${escHtml(l.nome || '—')}</strong></td>
      <td>
        ${wppLink}
        <button class="btn-copy" onclick="copyText('${escHtml(l.whatsapp || '')}', this)">Copiar</button>
      </td>
      <td style="color:var(--muted)">${escHtml(l.email || '—')}</td>
      <td><span class="badge ${escHtml(l.origem || '')}">${escHtml(origemLabel)}</span></td>
      <td>${classCss ? `<span class="badge ${classCss}">${escHtml(classLabel)}</span>` : '—'}</td>
      <td style="text-align:center">${l.pontuacao != null ? l.pontuacao : '—'}</td>
      <td>${receita}</td>
    </tr>`;
  }).join('');
}

/* ── COPY ── */
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1800);
  });
}

/* ── EXPORT CSV ── */
function exportCSV() {
  if (!allLeads.length) return;
  const header = ['Data','Nome','WhatsApp','Email','Origem','Classificação','Pontuação','Receita em risco'];
  const rows = allLeads.map(l => [
    new Date(l.created_at).toLocaleString('pt-BR'),
    l.nome || '',
    l.whatsapp || '',
    l.email || '',
    l.origem || '',
    l.classificacao || '',
    l.pontuacao ?? '',
    l.receita_risco ?? ''
  ]);
  const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cycleflow-leads-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

/* ── UTIL ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
